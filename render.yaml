# Render blueprint — one-click backend + managed Postgres.
# Frontend deploys separately to Vercel (see frontend/vercel.json).
services:
  - type: web
    name: nutriboard-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true        # strong random secret, satisfies prod env guard
      - key: ENCRYPTION_KEY
        generateValue: true        # separate key for encrypting OAuth tokens at rest
      - key: TRUST_PROXY
        value: 1
      - key: DATABASE_URL
        fromDatabase:
          name: nutriboard-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false                # set to your Vercel frontend URL
      - key: FRONTEND_URL
        sync: false
      - key: OAUTH_REDIRECT_BASE
        sync: false                # set to your Render API URL
      - key: ADMIN_EMAILS
        sync: false
databases:
  - name: nutriboard-db
    plan: free
