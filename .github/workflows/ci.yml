name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nutriboard
          POSTGRES_PASSWORD: nutriboard
          POSTGRES_DB: nutriboard
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U nutriboard"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://nutriboard:nutriboard@localhost:5432/nutriboard?schema=public
      JWT_SECRET: ci-test-secret-ci-test-secret-32chars
      ENCRYPTION_KEY: ci-test-encryption-key-ci-test-32ch
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package.json
      - run: npm install
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - run: npm run typecheck
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - run: npm install
      - run: npm run typecheck
      - run: npm run build

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npx --yes prettier@3 --check "backend/src/**/*.ts" "frontend/src/**/*.{ts,tsx}" || echo "::warning::Prettier formatting issues found"
