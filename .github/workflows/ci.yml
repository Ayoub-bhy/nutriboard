name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nutriboard
          POSTGRES_PASSWORD: nutriboard
          POSTGRES_DB: nutriboard
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U nutriboard"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://nutriboard:nutriboard@localhost:5432/nutriboard?schema=public
      JWT_SECRET: ci-test-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - run: npm run typecheck
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
